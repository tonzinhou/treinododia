<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Academia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">
        <div class="tabs">
            <button id="tab-aluno" class="tab-btn active" onclick="switchTab('usuario')">Sou Aluno</button>
            <button id="tab-admin" class="tab-btn" onclick="switchTab('admin')">Sou Administrador</button>
        </div>

        <div class="login-box">
            <div class="login-header">
                <h2 id="login-title">Acesso Aluno</h2>
                <p id="login-desc">Digite seus dados para ver seu treino.</p>
            </div>
            
            <div class="inputs" style="display: flex; flex-direction: column; gap: 15px;">
                <input type="email" id="email" placeholder="Seu e-mail">
                <input type="password" id="password" placeholder="Sua senha">
            </div>

            <button class="btn-principal" onclick="fazerLogin()" style="margin-top: 20px;">
                ENTRAR NO SISTEMA
            </button>
        </div>
        
        <p style="color: #666; font-size: 0.8rem; margin-top: 20px;">Desenvolvido para sua melhor performance.</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>

</body>
</html>
