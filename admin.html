<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Academia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="admin-container" style="max-width: 600px; margin: 20px auto; padding: 0 20px;">
        <header style="display: flex; justify-content: space-between; align-items: center;">
            <h1>Painel Admin</h1>
            <button onclick="logout()" style="background: #ff4444; padding: 5px 10px;">Sair</button>
        </header>

        <section class="admin-card">
            <h3>+ Cadastrar Novo Aluno</h3>
            <div class="form-group" style="display: flex; flex-direction: column; gap: 10px;">
                <input type="text" id="novoNome" placeholder="Nome Completo do Aluno">
                <input type="email" id="novoEmail" placeholder="E-mail de Login">
                <input type="password" id="novaSenha" placeholder="Senha Temporária">
                <button class="btn-principal" onclick="cadastrarNovoAluno()">Criar Conta do Aluno</button>
            </div>
        </section>

        <section class="admin-card" style="margin-top: 30px;">
            <h3>💪 Prescrever Treino</h3>
            <div class="form-group" style="display: flex; flex-direction: column; gap: 10px;">
                <label for="selectAlunos">Selecionar Aluno:</label>
                <select id="selectAlunos" style="padding: 10px; background: #121212; color: white;">
                    <option value="">Carregando alunos...</option>
                </select>

                <div style="display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; margin-top: 10px;">
                    <input type="text" id="exNome" placeholder="Exercício">
                    <input type="number" id="exSeries" placeholder="Sér.">
                    <input type="number" id="exReps" placeholder="Rep.">
                </div>
                <button class="btn-principal" style="background: #2ecc71; color: white;" onclick="atribuirTreino()">Adicionar Exercício ao Aluno</button>
            </div>
        </section>
    </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
    <script>
        window.onload = function() {
            // Verificamos se a função existe antes de chamar para não travar
            if (typeof carregarAlunos === "function") {
                carregarAlunos();
            } else {
                console.error("A função carregarAlunos não foi encontrada no script.js");
            }
        };
    </script>
<input type="text" id="exVideo" placeholder="Link do vídeo (YouTube/Instagram)" style="width: 100%; margin-top: 10px;">
</body>
</html>
