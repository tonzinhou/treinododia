<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Academia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="admin-container" style="max-width: 600px; margin: 20px auto; padding: 0 20px;">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1>Painel Admin</h1>
            <button onclick="logout()" class="btn-sair">Sair</button>
        </header>

        <div class="tabs" style="margin-bottom: 20px;">
            <button class="tab-btn active" onclick="switchAdminTab('aba-usuarios', this)">Usuários</button>
            <button class="tab-btn" onclick="switchAdminTab('aba-prescrever', this)">Prescrever</button>
            <button class="tab-btn" onclick="switchAdminTab('aba-editar', this)">Editar Treino</button>
        </div>

        <section id="aba-usuarios" class="admin-card">
            <h3>+ Cadastrar Novo Aluno</h3>
            <div class="form-group" style="display: flex; flex-direction: column; gap: 10px;">
                <input type="text" id="novoNome" placeholder="Nome Completo">
                <input type="email" id="novoEmail" placeholder="E-mail de Login">
                <input type="password" id="novaSenha" placeholder="Senha Temporária">
                <input type="text" id="novoFoto" placeholder="Link da Foto (URL)">
                <input type="text" id="novoFrase" placeholder="Frase Motivacional">
                <button class="btn-principal" onclick="cadastrarNovoAluno()">Criar Conta do Aluno</button>
            </div>
        </section>

        <section id="aba-prescrever" class="admin-card" style="display: none;">
            <h3>💪 Novo Exercício</h3>
            <div class="form-group" style="display: flex; flex-direction: column; gap: 12px;">
                <label>1. Selecionar Aluno:</label>
                <select id="selectAlunos"><option value="">Carregando alunos...</option></select>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div>
                        <label>2. Treino:</label>
                        <select id="exLetra">
                            <option value="A">Treino A</option>
                            <option value="B">Treino B</option>
                            <option value="C">Treino C</option>
                        </select>
                    </div>
                    <div>
                        <label>3. Grupo Muscular:</label>
                        <select id="exGrupo">
                            <option value="Peito">Peito</option>
                            <option value="Costas">Costas</option>
                            <option value="Pernas">Pernas</option>
                            <option value="Ombros">Ombros</option>
                            <option value="Braços">Braços</option>
                            <option value="Core">Core/Abdominais</option>
                        </select>
                    </div>
                </div>

                <label>4. Detalhes:</label>
                <input type="text" id="exNome" placeholder="Nome do Exercício">
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
                    <input type="number" id="exSeries" placeholder="Séries">
                    <input type="number" id="exReps" placeholder="Reps">
                    <input type="number" id="exDescanso" placeholder="Desc. (s)">
                </div>
                
                <input type="text" id="exVideo" placeholder="Link do vídeo (YouTube)">
                <button class="btn-principal" style="background: #2ecc71; color: white;" onclick="atribuirTreino()">Salvar Exercício</button>
            </div>
        </section>

        <section id="aba-editar" class="admin-card" style="display: none;">
            <h3>✏️ Editar / Excluir</h3>
            <label>Selecione o Aluno para carregar os treinos:</label>
            <select id="selectAlunosEdicao" onchange="buscarTreinosParaEdicao()">
                <option value="">Selecione o Aluno</option>
            </select>
            
            <div id="lista-edicao-treinos" style="margin-top: 20px; display: flex; flex-direction: column; gap: 15px;">
                </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
    <script>
        window.onload = function() {
            carregarAlunos();
        };

        // Função para trocar as abas no Admin
        function switchAdminTab(idAba, btn) {
    // 1. Esconde todas as seções
    document.getElementById('aba-usuarios').style.display = 'none';
    document.getElementById('aba-prescrever').style.display = 'none';
    document.getElementById('aba-editar').style.display = 'none';
    
    // 2. Remove a classe ativa de todos os botões
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    
    // 3. Mostra a aba clicada e ativa o botão
    document.getElementById(idAba).style.display = 'block';
    btn.classList.add('active');

    // 4. CRÍTICO: Carrega os alunos para os selects das abas 2 e 3
    if (typeof carregarAlunos === "function") {
        carregarAlunos();
    }
}
    </script>
</body>
</html>
